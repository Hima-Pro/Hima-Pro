<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <title></title>
  </head>
  <body>
    <div id="posts"></div>
    <script>
      fetch("https://tdim-blogger.vercel.app/posts")
      .then(res=>res.json())
      .then(posts=>{
        posts.entry.forEach(post=>{
          document.querySelector("#posts").innerHTML+=`
          <div class="post">
            <img width="100%" src="${post.thumbnail}">
            <h4>${post.title}</h4>
            <p>
              <span>${((tags)=>{
                var tagsHTML="";
                tags.forEach(tag=>{
                  tagsHTML+=`<button>${tag}</button>`;
                });
                return tagsHTML;
              })(post.label)}</span>
              <span>${post.updated}</span>
            </p>
          </div>
          `;
        });
      });
    </script>
  </body>
</html>
